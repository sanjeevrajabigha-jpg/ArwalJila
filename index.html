<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arwal District Guide | अरवल जिला</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">
    
    <nav class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto font-bold text-lg">📍 अरवल जिला दर्शन</div>
    </nav>

    <main class="p-4 max-w-6xl mx-auto mb-10 flex-grow w-full">
        <section class="bg-blue-700 text-white p-8 rounded-xl text-center shadow-lg mt-4 mb-10">
            <h1 class="text-3xl font-bold mb-2">अरवल जिला में आपका स्वागत है</h1>
            <p class="text-blue-100">बिहार का ऐतिहासिक और समृद्ध जिला।</p>
        </section>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div onclick="openModal('block')" class="bg-white p-4 rounded-xl shadow border-t-4 border-blue-500 cursor-pointer hover:bg-blue-50">
                <div class="text-2xl font-bold">5</div>
                <div class="text-xs text-gray-500">प्रखंड (Blocks)</div>
            </div>
            <div onclick="openModal('panchayat')" class="bg-white p-4 rounded-xl shadow border-t-4 border-green-500 cursor-pointer hover:bg-green-50">
                <div class="text-2xl font-bold">65</div>
                <div class="text-xs text-gray-500">पंचायतें</div>
            </div>
            <div onclick="openModal('village')" class="bg-white p-4 rounded-xl shadow border-t-4 border-orange-500 cursor-pointer hover:bg-orange-50">
                <div class="text-2xl font-bold">335</div>
                <div class="text-xs text-gray-500">गाँव</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow border-t-4 border-red-500">
                <div class="text-2xl font-bold">11</div>
                <div class="text-xs text-gray-500">पुलिस स्टेशन</div>
            </div>
        </div>
    </main>

    <div id="dataModal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden">
            <div id="modalHeader" class="p-4 flex justify-between items-center text-white bg-blue-600">
                <h3 id="modalTitle" class="font-bold">List</h3>
                <button onclick="closeModal()" class="text-2xl">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto" id="listContainer"></div>
        </div>
    </div>

    <script>
        // Data
        const blockList = ["अरवल", "कलेर", "करपी", "कुर्था", "सोनभद्र"];
        const panchayatList = ["पंचायत-1", "पंचायत-2", "पंचायत-3", "पंचायत-4", "पंचायत-5"]; // Add all 65
        const villageList = ["गाँव-1", "गाँव-2", "गाँव-3", "गाँव-4", "गाँव-5"]; // Add all 335

        function openModal(type) {
            const container = document.getElementById('listContainer');
            const title = document.getElementById('modalTitle');
            const header = document.getElementById('modalHeader');
            container.innerHTML = '';
            
            let data = type === 'block' ? blockList : (type === 'panchayat' ? panchayatList : villageList);
            title.innerText = type.toUpperCase() + " LIST";
            header.className = "p-4 flex justify-between items-center text-white bg-" + (type === 'block' ? 'blue' : (type === 'panchayat' ? 'green' : 'orange')) + "-600";
            
            data.forEach(item => {
                container.innerHTML += `<div class="p-2 border-b">${item}</div>`;
            });
            document.getElementById('dataModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('dataModal').classList.add('hidden');
        }
    </script>
</body>
</html>
